apiVersion: v1
kind: Pod
metadata:
  namespace: {{ .Release.Namespace }}
  name: "{{ include "one.fullname" . }}-test-connection"
  labels:
    {{- include "one.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      selector:
        {{- include "one.selectorLabels" . | nindent 8 }}
  containers:
    - name: wget
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      resources:
        limits:
          cpu: 50m
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 64Mi
      image: busybox:1.35
      command: ['wget']
      args: ['{{ include "one.fullname" . }}:{{ .Values.service.port }}']
  pullPolicy: Always
  restartPolicy: Never
