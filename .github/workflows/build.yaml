name: Build

on:
  push:
    branches:
    - 'main'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - run: go get
    - run: go install github.com/magefile/mage@latest
    - run: mage lint

  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - run: go get
    - run: go install github.com/magefile/mage@latest
    - run: mage package

  push:
    runs-on: ubuntu-latest
    needs:
    - lint
    - build
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - run: go get
    - run: go install github.com/magefile/mage@latest
    - run: mage -v push
