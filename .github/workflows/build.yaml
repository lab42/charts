name: Build

on:
  push:
    branches:
    - 'main'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
          ~/.magefile
        key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}

    - run: go install github.com/magefile/mage@latest
    - run: mage -compile ~/go/bin/mage

    - uses: actions/cache@v3
      with:
        path: ~/go/bin/mage
        key: ${{ runner.os }}-mage-${{ hashFiles('magefile.go') }}

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3

    - uses: actions/cache@v3
      with:
        path: ~/go/bin/mage
        key: ${{ runner.os }}-mage-${{ hashFiles('magefile.go') }}

    - run: ~/go/bin/mage lint

  Update-registry:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3
    - uses: actions/checkout@v3
      with:
        ref: registry
        path: charts

    - uses: actions/cache@v3
      with:
        path: ~/go/bin/mage
        key: ${{ runner.os }}-mage-${{ hashFiles('magefile.go') }}

    - run: ~/go/bin/mage -v package
    - run: ~/go/bin/mage -v index
    - run: ls -al charts
    - run: |
        cd charts
        git config --global user.name $GITHUB_ACTOR
        git config --global user.email "username@users.noreply.github.com"
        git add -A
        git commit -m $GITHUB_SHA
        git push
