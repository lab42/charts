name: Build

on:
  push:
    branches:
    - 'main'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
          ~/.magefile
        key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}

    - run: go install github.com/magefile/mage@latest
    - run: mage -compile ~/go/bin/mage

    - uses: actions/cache@v3
      with:
        path: ~/go/bin/mage
        key: ${{ runner.os }}-mage-${{ hashFiles('magefile.go') }}

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - uses: actions/checkout@v3

    - uses: actions/cache@v3
      with:
        path: ~/go/bin/mage
        key: ${{ runner.os }}-mage-${{ hashFiles('magefile.go') }}

    - run: ~/go/bin/mage lint

  Update-registry:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v3

    - uses: actions/cache@v3
      with:
        path: ~/go/bin/mage
        key: ${{ runner.os }}-mage-${{ hashFiles('magefile.go') }}

    - name: Add SSH key
      env:
        SSH_AUTH_SOCK: /tmp/ssh_agent.sock
      run: |
        mkdir -p ~/.ssh\nssh-keyscan github.com >> ~/.ssh/known_hosts
        echo "$(( secrets.SSH_PRIVATE_KEY ))" > ~/.ssh/github_actions
        chmod 600 ~/.ssh/github_actions\nssh-agent -a $SSH_AUTH_SOCK > /dev/null
        ssh-add ~/.ssh/github_actions

    - run: ~/go/bin/mage -v update
    - run: ls -al charts
