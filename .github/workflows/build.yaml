name: Build

on:
  push:
    branches:
    - 'main'

jobs:
  build-charts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - run: go get
    - run: go install github.com/magefile/mage@latest

    - run: mage lint
    - run: mage build
    - run: mage -v push
