name: Build

on:
  push:
    branches:
    - 'main'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-go@v3
      with:
        go-version: '1.19'

    - run: go get
    - run: go install github.com/magefile/mage@latest

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - run: go/bin/mage lint

  package:
    runs-on: ubuntu-latest
    needs: setup
    steps:
    - run: go/bin/mage package

  push:
    runs-on: ubuntu-latest
    needs: [lint, package]
    steps:
    - run: go/bin/mage -v push
